<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>TextUtils Pro | Smart Online Text Editor & Voice Analyzer</title>
    <meta name="title" content="TextUtils Pro | Smart Online Text Editor & Voice Analyzer">
    <meta name="description" content="TextUtils Pro is a free, smart online text utility tool. Count words, convert text cases, clean formatting, use speech-to-text dictation, and read text aloud instantly.">
    <meta name="keywords" content="text utils, word counter, case converter, text to speech, speech to text, online text editor, format text, character counter">
    <meta name="author" content="TextUtils Pro">
    <meta name="theme-color" content="#667eea">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://megatooluniverse.github.io/TextUtilsPro/">
    <meta property="og:title" content="TextUtils Pro | Smart Online Text Editor">
    <meta property="og:description" content="Free online text utility tool with voice dictation, read text, case conversion, and more.">
    <meta property="og:image" content="https://via.placeholder.com/1200x630.png?text=TextUtils+Pro">

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://megatooluniverse.github.io/TextUtilsPro/">
    <meta property="twitter:title" content="TextUtils Pro | Smart Online Text Editor">
    <meta property="twitter:description" content="Free online text utility tool with voice dictation, read text, case conversion, and more.">
    <meta property="twitter:image" content="https://via.placeholder.com/1200x630.png?text=TextUtils+Pro">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✨</text></svg>">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* =========================================
           CSS VARIABLES & THEME SETUP
           ========================================= */
        :root {
            --bg-gradient: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            --card-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text-color: #2d3748;
            --text-secondary: #4a5568;
            --primary: #667eea;
            --primary-hover: #5a67d8;
            --accent: #ed6ea0;
            --danger: #fc8181;
            --success: #68d391;
            --shadow-sm: 0 4px 6px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 10px 20px rgba(0, 0, 0, 0.08);
            --radius: 20px;
            --font-main: 'Poppins', sans-serif;
        }

        body.dark-theme {
            --bg-gradient: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            --card-bg: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-color: #f7fafc;
            --text-secondary: #a0aec0;
            --primary: #4fd1c5;
            --primary-hover: #38b2ac;
            --accent: #f687b3;
            --danger: #fc8181;
            --shadow-md: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        /* =========================================
           RESET & GLOBAL STYLES
           ========================================= */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            outline: none; 
        }
        
        body {
            font-family: var(--font-main);
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-color);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: all 0.5s ease;
        }

        ::-webkit-scrollbar { 
            width: 10px; 
        }

        ::-webkit-scrollbar-track { 
            background: transparent; 
        }

        ::-webkit-scrollbar-thumb { 
            background: var(--primary); 
            border-radius: 5px; 
        }

        .container { 
            max-width: 1100px; 
            margin: 0 auto; 
            padding: 40px 20px; 
            flex: 1; 
            width: 100%; 
        }

        /* Glassmorphism */
        .glass {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* =========================================
           HEADER
           ========================================= */
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 35px; 
            padding: 20px 30px; 
        }

        .logo-area h1 { 
            font-size: 2rem; 
            font-weight: 700; 
            background: linear-gradient(to right, var(--primary), var(--accent)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        .logo-area span { 
            color: var(--text-secondary); 
            font-size: 0.95rem; 
            font-weight: 500; 
        }

        .theme-toggle {
            background: rgba(255,255,255,0.2);
            border: 1px solid var(--glass-border);
            color: var(--text-color);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover { 
            transform: translateY(-3px); 
            box-shadow: var(--shadow-sm); 
            background: var(--primary); 
            color: white; 
        }

        /* =========================================
           STATS GRID
           ========================================= */
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 20px; 
            margin-bottom: 30px; 
        }

        @media (min-width: 768px) { 
            .stats-grid { 
                grid-template-columns: repeat(4, 1fr); 
            } 
        }

        .stat-card { 
            padding: 20px; 
            text-align: center; 
        }

        .stat-card:hover { 
            transform: translateY(-5px); 
        }

        .stat-value { 
            font-size: 2rem; 
            font-weight: 700; 
            color: var(--primary); 
            display: block; 
        }

        .stat-label { 
            font-size: 0.8rem; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            color: var(--text-secondary); 
            font-weight: 600; 
        }

        /* =========================================
           EDITOR AREA
           ========================================= */
        .editor-container { 
            margin-bottom: 30px; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }
        
        textarea {
            width: 100%;
            height: 350px;
            padding: 30px;
            border: none;
            resize: vertical;
            background-color: transparent;
            color: var(--text-color);
            font-size: 1.15rem;
            line-height: 1.8;
            font-family: inherit;
        }

        textarea::placeholder { 
            color: var(--text-secondary); 
            opacity: 0.7; 
        }

        .editor-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background: rgba(0,0,0,0.03);
            border-top: 1px solid var(--glass-border);
            flex-wrap: wrap;
            gap: 15px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .btn-primary { 
            background: linear-gradient(135deg, var(--primary), var(--accent)); 
            color: white; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }

        .btn-primary:hover { 
            transform: translateY(-2px); 
            filter: brightness(1.1); 
        }
        
        .btn-secondary { 
            background: var(--card-bg); 
            border: 1px solid var(--glass-border); 
            color: var(--text-color); 
        }

        .btn-secondary:hover { 
            background: var(--glass-border); 
        }

        .btn-danger { 
            background: rgba(252, 129, 129, 0.15); 
            color: var(--danger); 
        }

        .btn-danger:hover { 
            background: var(--danger); 
            color: white; 
        }

        .btn-voice { 
            background: #10b981; 
            color: white; 
        }

        .btn-voice:hover { 
            background: #059669; 
            transform: translateY(-2px); 
        }

        .recording { 
            animation: pulse 1.5s infinite; 
            background: var(--danger) !important; 
            color: white !important; 
        }

        @keyframes pulse { 
            0% { box-shadow: 0 0 0 0 rgba(252, 129, 129, 0.7); } 
            70% { box-shadow: 0 0 0 15px rgba(252, 129, 129, 0); } 
            100% { box-shadow: 0 0 0 0 rgba(252, 129, 129, 0); } 
        }

        /* =========================================
           TOOLS SECTION
           ========================================= */
        .tools-wrapper { 
            display: grid; 
            gap: 30px; 
        }

        @media (min-width: 800px) { 
            .tools-wrapper { 
                grid-template-columns: 1fr 1fr; 
            } 
        }

        .tool-category { 
            padding: 30px; 
        }

        .tool-category h3 { 
            font-size: 1.2rem; 
            margin-bottom: 20px; 
            color: var(--text-color); 
            display: flex; 
            align-items: center; 
            gap: 10px; 
        }

        .tool-category h3::after { 
            content: ''; 
            flex: 1; 
            height: 1px; 
            background: var(--glass-border); 
            margin-left: 10px; 
        }

        .tool-grid { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 12px; 
        }

        .tool-btn {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--glass-border);
            padding: 12px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            flex-grow: 1;
            text-align: center;
            transition: all 0.3s;
        }

        .tool-btn:hover { 
            border-color: var(--primary); 
            color: white; 
            background: var(--primary); 
            transform: translateY(-3px); 
            box-shadow: var(--shadow-sm); 
        }

        /* =========================================
           FOOTER
           ========================================= */
        footer { 
            margin-top: 50px; 
            padding: 20px; 
            text-align: center; 
            color: var(--text-secondary); 
            font-weight: 500; 
        }

        /* =========================================
           TOAST NOTIFICATION
           ========================================= */
        #toast {
            visibility: hidden; 
            min-width: 250px; 
            background: linear-gradient(to right, #11998e, #38ef7d);
            color: white; 
            text-align: center; 
            border-radius: 50px; 
            padding: 16px 30px;
            position: fixed; 
            z-index: 2000; 
            left: 50%; 
            bottom: 40px;
            transform: translateX(-50%) translateY(20px); 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            opacity: 0; 
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55); 
            font-weight: 600; 
            font-size: 1rem;
        }

        #toast.show { 
            visibility: visible; 
            opacity: 1; 
            transform: translateX(-50%) translateY(0); 
        }
    </style>
</head>
<body>

<div class="container">
    <header class="glass">
        <div class="logo-area">
            <h1>TextUtils Pro ✨</h1>
            <span>Smart Editor & Voice Analyzer</span>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">
            <span id="themeIcon">🌙</span> <span class="theme-text">Dark Mode</span>
        </button>
    </header>

    <div class="stats-grid">
        <div class="stat-card glass">
            <span class="stat-value" id="wordCount">0</span>
            <span class="stat-label">Words</span>
        </div>
        <div class="stat-card glass">
            <span class="stat-value" id="charCount">0</span>
            <span class="stat-label">Characters</span>
        </div>
        <div class="stat-card glass">
            <span class="stat-value" id="lineCount">0</span>
            <span class="stat-label">Lines</span>
        </div>
        <div class="stat-card glass">
            <span class="stat-value" id="readTime">0s</span>
            <span class="stat-label">Read Time</span>
        </div>
    </div>

    <div class="editor-container glass">
        <textarea id="inputText" placeholder="Type, paste, or dictate your content here..."></textarea>
        
        <div class="editor-actions">
            <div style="display:flex; gap: 10px;">
                <button class="btn btn-voice" id="micBtn" onclick="toggleDictation()">🎤 Start Dictation</button>
                <button class="btn btn-secondary" onclick="speakText()">🔊 Read Text</button>
                <button class="btn btn-secondary" onclick="stopSpeaking()">⏹️ Stop</button>
            </div>
            <div style="display:flex; gap: 10px;">
                <button class="btn btn-secondary" onclick="downloadText()">💾 Save</button>
                <button class="btn btn-danger" onclick="clearText()">🗑️ Clear</button>
                <button class="btn btn-primary" onclick="copyText()">📋 Copy</button>
            </div>
        </div>
    </div>

    <div class="tools-wrapper">
        <div class="tool-category glass">
            <h3>🔠 Case Converters</h3>
            <div class="tool-grid">
                <button class="tool-btn" onclick="transform('upper')">UPPERCASE</button>
                <button class="tool-btn" onclick="transform('lower')">lowercase</button>
                <button class="tool-btn" onclick="transform('title')">Title Case</button>
                <button class="tool-btn" onclick="transform('sentence')">Sentence case</button>
                <button class="tool-btn" onclick="transform('alternating')">aLtErNaTiNg</button>
            </div>
        </div>

        <div class="tool-category glass">
            <h3>🧹 Clean & Format</h3>
            <div class="tool-grid">
                <button class="tool-btn" onclick="transform('trimSpaces')">Fix Extra Spaces</button>
                <button class="tool-btn" onclick="transform('removeEmptyLines')">Remove Empty Lines</button>
                <button class="tool-btn" onclick="transform('bullet')">Add Bullets (•)</button>
                <button class="tool-btn" onclick="transform('number')">Add Numbers (1.)</button>
                <button class="tool-btn" onclick="transform('unformat')">Remove Formatting</button>
            </div>
        </div>
        
        <div class="tool-category glass" style="grid-column: 1 / -1;">
            <h3>🔃 Advanced Tools</h3>
            <div class="tool-grid">
                <button class="tool-btn" onclick="transform('sortAZ')">Sort A-Z</button>
                <button class="tool-btn" onclick="transform('sortZA')">Sort Z-A</button>
                <button class="tool-btn" onclick="transform('reverse')">Reverse Text</button>
                <button class="tool-btn" onclick="transform('oneline')">Make Single Line</button>
                <button class="tool-btn" onclick="transform('extractEmails')">Extract Emails</button>
            </div>
        </div>
    </div>
</div>

<footer>
    <p>&copy; <script>document.write(new Date().getFullYear())</script> TextUtils Pro. Created with ❤️</p>
</footer>

<div id="toast">Notification</div>

<script>
    // =========================================
    // DOM ELEMENTS
    // =========================================
    const textarea = document.getElementById('inputText');
    const toast = document.getElementById('toast');
    const themeIcon = document.getElementById('themeIcon');

    const els = {
        words: document.getElementById('wordCount'),
        chars: document.getElementById('charCount'),
        lines: document.getElementById('lineCount'),
        readTime: document.getElementById('readTime')
    };

    // =========================================
    // INITIALIZATION
    // =========================================
    window.onload = () => {
        updateStats();
        
        // Check for saved theme
        const savedTheme = localStorage.getItem('theme');
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        
        if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
            enableDarkMode();
        }
    };

    textarea.addEventListener('input', updateStats);

    // =========================================
    // STATS LOGIC
    // =========================================
    function updateStats() {
        const text = textarea.value;
        
        // Character count
        els.chars.innerText = text.length.toLocaleString();
        
        // Word count
        const words = text.trim() === '' ? [] : text.trim().split(/\s+/);
        els.words.innerText = words.length.toLocaleString();

        // Line count
        const lines = text.length === 0 ? 0 : text.split(/\r\n|\r|\n/).length;
        els.lines.innerText = lines.toLocaleString();

        // Read time calculation
        const minutes = words.length / 200;
        if (words.length === 0) {
            els.readTime.innerText = "0s";
        } else if (minutes < 1) {
            els.readTime.innerText = Math.ceil(minutes * 60) + "s";
        } else {
            els.readTime.innerText = Math.ceil(minutes) + "m";
        }
    }

    // =========================================
    // TEXT TRANSFORMATION LOGIC
    // =========================================
    function transform(type) {
        let text = textarea.value;
        
        if (!text) { 
            showToast("⚠️ Write something first!"); 
            return; 
        }
        
        let original = text;

        switch (type) {
            case 'upper': 
                text = text.toUpperCase(); 
                break;
            case 'lower': 
                text = text.toLowerCase(); 
                break;
            case 'title': 
                text = text.toLowerCase().replace(/\b\w/g, c => c.toUpperCase()); 
                break;
            case 'sentence': 
                text = text.replace(/(^\s*\w|[.!?]\s*\w)/g, c => c.toUpperCase()); 
                break;
            case 'alternating': 
                text = text.split('').map((c, i) => i % 2 === 0 ? c.toLowerCase() : c.toUpperCase()).join(''); 
                break;
            case 'trimSpaces': 
                text = text.replace(/[ \t]+/g, ' ').trim(); 
                break;
            case 'removeEmptyLines': 
                text = text.split(/\n/).filter(line => line.trim() !== '').join('\n'); 
                break;
            case 'sortAZ': 
                text = text.split('\n').sort((a, b) => a.localeCompare(b)).join('\n'); 
                break;
            case 'sortZA': 
                text = text.split('\n').sort((a, b) => b.localeCompare(a)).join('\n'); 
                break;
            case 'reverse': 
                text = text.split('').reverse().join(''); 
                break;
            case 'oneline': 
                text = text.replace(/[\r\n]+/g, ' '); 
                break;
            case 'bullet': 
                text = text.split('\n').map(line => line.trim() ? (line.trim().startsWith('•') ? line : `• ${line}`) : line).join('\n'); 
                break;
            case 'number': 
                text = text.split('\n').filter(line => line.trim()).map((line, i) => `${i + 1}. ${line.replace(/^\d+\.\s/, '')}`).join('\n'); 
                break;
            case 'unformat': 
                text = text.replace(/^[•\-\*]\s/gm, '').replace(/^\d+\.\s/gm, ''); 
                break;
            case 'extractEmails': {
                const emails = text.match(/([a-zA-Z0-9._-]+@[a-zA-Z0-9._-]+\.[a-zA-Z0-9._-]+)/gi);
                text = emails ? emails.join('\n') : "No emails found";
                break;
            }
        }

        if (text === original && type !== 'extractEmails') {
            showToast("ℹ️ No changes needed");
        } else {
            textarea.value = text;
            updateStats();
            showToast("✅ Text Updated");
        }
    }

    // =========================================
    // ACTION BUTTONS
    // =========================================
    function clearText() {
        if (textarea.value.length > 0) {
            textarea.value = '';
            updateStats();
            showToast("🗑️ Editor Cleared");
        }
    }

    async function copyText() {
        if (!textarea.value) { 
            showToast("⚠️ Nothing to copy"); 
            return; 
        }
        
        try {
            await navigator.clipboard.writeText(textarea.value);
            showToast("📋 Copied to clipboard");
        } catch (err) {
            textarea.select();
            document.execCommand('copy');
            showToast("📋 Copied");
        }
    }

    function downloadText() {
        if (!textarea.value) { 
            showToast("⚠️ Nothing to download"); 
            return; 
        }
        
        const element = document.createElement('a');
        const file = new Blob([textarea.value], {type: 'text/plain'});
        element.href = URL.createObjectURL(file);
        element.download = "textutils-document.txt";
        
        document.body.appendChild(element);
        element.click();
        document.body.removeChild(element);
        
        showToast("💾 File Downloaded");
    }

    // =========================================
    // VOICE FEATURES
    // =========================================
    function speakText() {
        if ('speechSynthesis' in window) {
            if (!textarea.value) { 
                showToast("⚠️ Write something to read!"); 
                return; 
            }
            
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(textarea.value);
            window.speechSynthesis.speak(utterance);
            showToast("🔊 Reading text...");
        } else {
            showToast("❌ Text-to-speech not supported.");
        }
    }

    function stopSpeaking() {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            showToast("⏹️ Stopped reading");
        }
    }

    let recognition;
    let isRecording = false;

    function toggleDictation() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (!SpeechRecognition) {
            showToast("❌ Dictation not supported in this browser.");
            return;
        }

        const micBtn = document.getElementById('micBtn');

        if (isRecording) {
            recognition.stop();
            return;
        }

        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;

        recognition.onstart = function() {
            isRecording = true;
            micBtn.innerHTML = "🔴 Listening...";
            micBtn.classList.add("recording");
            showToast("🎤 Speak now...");
        };

        recognition.onresult = function(event) {
            let finalTranscript = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    finalTranscript += event.results[i][0].transcript;
                }
            }
            if (finalTranscript) {
                const space = (textarea.value.length > 0 && !textarea.value.endsWith(' ')) ? ' ' : '';
                textarea.value += space + finalTranscript;
                updateStats();
            }
        };

        recognition.onerror = function(event) {
            showToast("❌ Error: " + event.error);
            stopDictationUI();
        };

        recognition.onend = function() {
            stopDictationUI();
        };

        recognition.start();
    }

    function stopDictationUI() {
        isRecording = false;
        const micBtn = document.getElementById('micBtn');
        micBtn.innerHTML = "🎤 Start Dictation";
        micBtn.classList.remove("recording");
    }

    // =========================================
    // THEME & TOAST LOGIC
    // =========================================
    function toggleTheme() {
        if (document.body.classList.contains('dark-theme')) {
            document.body.classList.remove('dark-theme');
            themeIcon.innerText = "🌙";
            document.querySelector('.theme-text').innerText = "Dark Mode";
            localStorage.setItem('theme', 'light');
        } else {
            enableDarkMode();
        }
    }

    function enableDarkMode() {
        document.body.classList.add('dark-theme');
        themeIcon.innerText = "☀️";
        document.querySelector('.theme-text').innerText = "Light Mode";
        localStorage.setItem('theme', 'dark');
    }

    function showToast(message) {
        toast.innerText = message;
        toast.className = "show";
        
        setTimeout(() => {
            toast.className = toast.className.replace("show", "");
        }, 3000);
    }
</script>

</body>
</html>
